name: BoatRacePredictor
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  BoatRacePredictor:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BoatRacePredictor
    settings:
      base:
        PRODUCT_NAME: BoatRacePredictor
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.boatracepredictor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: BoatRacePredictor/Info.plist
      properties:
        CFBundleName: "舟読み"
        CFBundleDisplayName: "舟読み"
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Light
